name: Apply DB Migrations to Preview

on:
  push:
    branches:
      - preview
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: preview-db-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Supabase Migrations (Preview)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Apply migrations to preview
        run: |
          ENCODED_PASSWORD="$(python3 -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['SUPABASE_PREVIEW_DB_PASSWORD']))")"
          DB_URL="postgresql://postgres.eqefgwdsqabnmpnbpqbq:${ENCODED_PASSWORD}@aws-1-us-east-2.pooler.supabase.com:5432/postgres?sslmode=require"
          supabase db push --db-url "$DB_URL"
        env:
          SUPABASE_PREVIEW_DB_PASSWORD: ${{ secrets.SUPABASE_PREVIEW_DB_PASSWORD }}
