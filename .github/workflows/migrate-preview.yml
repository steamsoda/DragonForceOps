name: Apply DB Migrations to Preview

on:
  push:
    branches:
      - preview
    paths:
      - 'supabase/migrations/**'

concurrency:
  group: preview-db-migrations
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Supabase Migrations (Preview)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Apply migrations to preview
        run: |
          supabase link --project-ref "$SUPABASE_PREVIEW_PROJECT_REF" --password "$SUPABASE_PREVIEW_DB_PASSWORD"
          supabase db push --password "$SUPABASE_PREVIEW_DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PREVIEW_PROJECT_REF: ${{ secrets.SUPABASE_PREVIEW_PROJECT_REF }}
          SUPABASE_PREVIEW_DB_PASSWORD: ${{ secrets.SUPABASE_PREVIEW_DB_PASSWORD }}
