name: Security Secret Scan

on:
  push:
    branches:
      - preview
      - main
  pull_request:
    branches:
      - preview
      - main

jobs:
  trufflehog:
    name: TruffleHog (Advisory)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run TruffleHog scan
        id: trufflehog
        shell: bash
        run: |
          mkdir -p artifacts
          set +e
          docker run --rm \
            -v "$PWD:/pwd" \
            ghcr.io/trufflesecurity/trufflehog:latest \
            git file:///pwd \
            --results=verified,unknown \
            --json > artifacts/trufflehog.jsonl 2> artifacts/trufflehog.stderr
          status=$?
          set -e
          echo "exit_code=$status" >> "$GITHUB_OUTPUT"
          TRUFFLEHOG_EXIT_CODE="$status" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path("artifacts/trufflehog.jsonl")
          count = 0
          if path.exists():
            for line in path.read_text(encoding="utf-8", errors="ignore").splitlines():
              line = line.strip()
              if not line:
                continue
              try:
                json.loads(line)
                count += 1
              except json.JSONDecodeError:
                pass

          exit_code = os.environ.get("TRUFFLEHOG_EXIT_CODE", "0")
          summary = Path("artifacts/trufflehog-summary.md")
          summary.write_text(
            "\n".join(
              [
                "## TruffleHog Advisory Result",
                f"- Exit code: {exit_code}",
                f"- Parsed findings: {count}",
                "- Policy: advisory only in v1; review findings before hard-gating CI.",
              ]
            ),
            encoding="utf-8",
          )
          PY

      - name: Add job summary
        if: always()
        shell: bash
        run: cat artifacts/trufflehog-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload TruffleHog artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: artifacts/
