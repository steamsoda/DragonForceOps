name: Apply DB Migrations to Production

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/migrations/**'

jobs:
  migrate:
    name: Run Supabase Migrations
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: 2.78.1

      - name: Apply migrations to production
        run: |
          DB_URL="$(python3 - <<'PY'
          import os
          import urllib.parse

          raw = os.environ["SUPABASE_PROD_DB_URL"]
          parsed = urllib.parse.urlparse(raw)
          password = urllib.parse.quote(urllib.parse.unquote(parsed.password or ""))
          project_ref = "hjvytfaalnfcqfgbxsmj"
          pooler_host = "aws-1-us-east-2.pooler.supabase.com"
          db_url = f"postgresql://postgres.{project_ref}:{password}@{pooler_host}:5432/postgres?sslmode=require"
          print(db_url)
          PY
          )"
          supabase db push --db-url "$DB_URL"
        env:
          SUPABASE_PROD_DB_URL: ${{ secrets.SUPABASE_PROD_DB_URL }}
